name: Auto Shorts Pipeline

on:
  workflow_dispatch:

  schedule:
    - cron: "0 * * * *"

jobs:
  shorts:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # recreate oauth files
      - name: Recreate client_secret.json
        run: echo "$CLIENT_SECRET_JSON" | base64 --decode > client_secret.json
        env:
          CLIENT_SECRET_JSON: ${{ secrets.CLIENT_SECRET_JSON }}

      - name: Recreate token.json
        run: echo "$TOKEN_JSON" | base64 --decode > token.json
        env:
          TOKEN_JSON: ${{ secrets.TOKEN_JSON }}

      - name: Run pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python pipeline.py

      # persist topic history + upload logs
      - name: Commit updated logs
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add used_topics.json upload_log.json

          git commit -m "Update logs" || echo "No changes"

          git push
