name: Shorts Automation Pipeline

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:        # manual trigger anytime

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    # NICHE is NOT set here — pipeline.py picks one randomly each run
    env:
      GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
      PEXELS_API_KEY:      ${{ secrets.PEXELS_API_KEY }}
      CLIENT_SECRET_JSON:  ${{ secrets.CLIENT_SECRET_JSON }}
      TOKEN_JSON:          ${{ secrets.TOKEN_JSON }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg libsm6 libxext6 fonts-dejavu-core

      - name: Install Python dependencies
        run: pip install -r requirements.txt pytrends --quiet

      - name: Run pipeline
        run: python pipeline.py

      - name: Upload log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: upload-log-${{ github.run_id }}
          path: upload_log.json
          retention-days: 30
